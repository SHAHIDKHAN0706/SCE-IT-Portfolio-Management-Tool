name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  web:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - name: Enforce color tokens
        run: |
          if rg -n "#[0-9A-Fa-f]{6}" src --glob "*.{css,tsx,ts}" --glob "!src/styles/tokens.css"; then
            echo "Hard-coded hex colors found outside tokens.css";
            exit 1;
          fi
  api:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -e .[test]
      - run: pytest

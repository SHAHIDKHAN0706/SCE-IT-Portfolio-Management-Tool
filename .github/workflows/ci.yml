name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  static-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: HTML validation
        run: npx --yes htmlhint "web/**/*.html"
      - name: JS lint
        run: |
          files=$(find web -type f -name "*.js" -not -path "*/node_modules/*" -not -path "*/dist/*" -not -path "*/public/vendor/*" | tr '\n' ' ')
          if [ -n "$files" ]; then
            npx --yes eslint $files --no-config-lookup --global window --global document --global localStorage --global Blob --global URL --global Option --global fetch --rule "no-unused-vars:error" --rule "no-undef:error"
          else
            echo "No JS files found in web/; skipping eslint."
          fi
